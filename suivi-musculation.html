<script>
/* Applique la safe-area memorisee AVANT le 1er paint (evite le flash de barre de nav mal placee sur PWA iOS) */
(function(){ try{
  var st = document.documentElement.style;
  /* cle -sa2 : le passage au statut 'black' (v53) cadre l'app SOUS la barre d'etat -> l'ancien
     padding haut memorise (t:62 de l'ere black-translucent) doit etre invalide */
  var s = JSON.parse(localStorage.getItem('increm-sa2') || 'null');
  if (!s && window.navigator.standalone === true) s = { b:34, t:0 };
  if (s) {
    if (s.b > 0) st.setProperty('--nav-pb', 'calc(7px + ' + s.b + 'px)');
    if (s.t > 0) st.setProperty('--header-pt', s.t + 'px');
  }
  /* PWA : hauteur epinglee avant le 1er paint (l'app est cadree sous la barre d'etat depuis v53 :
     innerHeight = hauteur du cadre ; ne PAS utiliser screen.height qui depasserait du cadre). */
  if (window.navigator.standalone === true && window.innerHeight) {
    st.setProperty('--app-h', window.innerHeight + 'px');
  }
} catch(e) {} })();
</script>

<title>Increm</title>
<style>
  :root, [data-theme="dark"] {
    --bg:#0f1320; --surface:#181d2b; --surface-2:#212838; --surface-3:#2a3346;
    --border:#2f3850; --border-soft:#242c40; --text:#e6e9ef; --text-dim:#9aa4b2; --text-faint:#6b7482;
    --accent:#4f8cff; --accent-press:#3b78ef; --accent-soft:rgba(79,140,255,.16); --on-accent:#fff;
    --accent-grad:linear-gradient(135deg,#4f8cff,#8b5cf6);
    --success:#34d399; --success-bg:rgba(52,211,153,.14); --success-line:rgba(52,211,153,.40);
    --warning:#fbbf24; --warning-bg:rgba(251,191,36,.14);
    --danger:#f87171; --danger-bg:rgba(248,113,113,.13);
    --shadow:0 8px 30px rgba(0,0,0,.45); --elev:0 1px 2px rgba(0,0,0,.24), 0 6px 20px rgba(0,0,0,.20);
  }
  [data-theme="light"] {
    --bg:#eef1f5; --surface:#ffffff; --surface-2:#f3f5f8; --surface-3:#e8ebf0;
    --border:#dfe3ea; --border-soft:#eaedf2; --text:#1c2330; --text-dim:#5b6573; --text-faint:#8a93a1;
    --accent:#2563eb; --accent-press:#1d4ed8; --accent-soft:rgba(37,99,235,.10); --on-accent:#fff;
    --accent-grad:linear-gradient(135deg,#2563eb,#7c3aed);
    --success:#059669; --success-bg:rgba(5,150,105,.10); --success-line:rgba(5,150,105,.30);
    --warning:#b45309; --warning-bg:rgba(180,83,9,.10);
    --danger:#dc2626; --danger-bg:rgba(220,38,38,.08);
    --shadow:0 8px 30px rgba(20,30,50,.10); --elev:0 1px 2px rgba(20,30,50,.05), 0 6px 18px rgba(20,30,50,.07);
  }
  /* palette alternative : Émeraude */
  [data-theme="dark"][data-palette="emeraude"] {
    --bg:#0d1614; --surface:#15211d; --surface-2:#1d2c27; --surface-3:#263831;
    --border:#2f443c; --border-soft:#243630;
    --accent:#2dd4a7; --accent-press:#17b890; --accent-soft:rgba(45,212,167,.16); --on-accent:#06241c;
    --accent-grad:linear-gradient(135deg,#10b981,#2dd4ee);
  }
  [data-theme="light"][data-palette="emeraude"] { --accent:#059669; --accent-press:#047857; --accent-soft:rgba(5,150,105,.12); --accent-grad:linear-gradient(135deg,#059669,#0891b2); }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { min-height:100vh; min-height:100dvh; background:var(--bg); }
  body { min-height:100vh; min-height:100dvh; }
  body {
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  body::before { content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:radial-gradient(1100px 460px at 50% -6%, color-mix(in srgb,var(--accent) 10%, transparent), transparent 68%); }
  .wrap { max-width:1060px; margin:0 auto; padding:0 18px; }
  html { scrollbar-gutter: stable; }
  .icon { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; display:block; flex:0 0 auto; }
  .icon.grip { stroke:none; fill:currentColor; }

  header { position:sticky; top:0; z-index:40; background:color-mix(in srgb,var(--bg) 88%,transparent); backdrop-filter:saturate(160%) blur(10px); border-bottom:1px solid var(--border); }
  .topbar { display:flex; align-items:center; gap:18px; height:58px; }
  .logo { display:flex; align-items:center; gap:9px; font-weight:800; font-size:17px; letter-spacing:-.2px; white-space:nowrap; }
  .logo .icon { color:var(--accent); width:24px; height:24px; }
  .logo-mark { width:30px; height:30px; flex:0 0 auto; }

  .toast-undo { margin-left:10px; background:transparent; border:1px solid rgba(255,255,255,.55); color:inherit; border-radius:7px; padding:3px 10px; font-weight:700; font-size:12px; cursor:pointer; }

  .help-box { background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:9px 11px; margin:8px 0 4px; font-size:12px; line-height:1.5; color:var(--text-faint); }

  #toast { z-index:400; }
  /* En app installee (PWA plein ecran) : barre du bas plus compacte, icones plus proches du bord
     (le gros espace = zone reservee a la barre d'accueil iPhone ; on la reduit pour un look proche de Safari) */
  @media (max-width:680px) and (display-mode: standalone) {
    /* App-shell en PWA : la barre est DANS LE FLUX (plus de position:fixed) -> immunisee contre le
       bug de composition iOS des elements fixes au lancement a froid (que meme un re-rendu force ne
       recale pas — seule une interaction native le faisait). Seul le contenu (main) defile.
       navSettle() garantit que nav.tabs est le dernier enfant de <body> (fin de colonne flex). */
    body { position:fixed; top:0; left:0; right:0; height:100vh; height:var(--app-h, 100dvh); min-height:0; display:flex; flex-direction:column; overflow:hidden; }
    body::before { display:none; }  /* halo fixe : encore une couche fixe, inutile ici */
    main.wrap { flex:1 1 auto; min-height:0; overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; padding-bottom:26px; }
    nav.tabs {
      position:static; left:auto; right:auto; bottom:auto;
      padding-bottom:16px !important;
      background:var(--surface) !important;
      -webkit-backdrop-filter:none !important; backdrop-filter:none !important;
      box-shadow:none;
      transform:none;
    }
  }

<script>
(function () {
  'use strict';

  var APP_VERSION = 'v53';
  var IS_PREVIEW = location.pathname.indexOf('/preview/') !== -1;

  var KEY_SYNC = IS_PREVIEW ? 'suivi-muscu-sync-preview' : 'suivi-muscu-sync';
  var DEFAULT_LIB = [
    'Développé couché','Développé incliné','Développé militaire','Squat','Soulevé de terre',
    'Presse à cuisses','Fentes','Leg curl','Leg extension','Mollets debout','Tractions','Rowing barre',
    'Tirage vertical','Tirage horizontal','Curl biceps','Curl marteau','Extension triceps','Dips',
    'Élévations latérales','Face pull','Crunch','Gainage'
  ];
  var ICON_MOON = '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
  var ICON_SUN  = '<circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';

  var state = { weeks: [], library: [], templates: [], measurements: [], settings: { theme:'dark', metric:'weight' }, currentWeekId: null };
  var progSelected = null;

  /* ---------- helpers ---------- */
  function $(id){ return document.getElementById(id); }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function escA(s){ return esc(s); }
  function todayISO(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function formatDateFR(iso){ if(!iso) return ''; var a=iso.split('-'); return a.length===3?(a[2]+'/'+a[1]+'/'+a[0]):iso; }
  function mondayISO(iso){ var p=iso.split('-'); var dt=new Date(Date.UTC(+p[0],+p[1]-1,+p[2])); var dow=dt.getUTCDay(); dt.setUTCDate(dt.getUTCDate()-(dow===0?6:dow-1)); return dt.getUTCFullYear()+'-'+String(dt.getUTCMonth()+1).padStart(2,'0')+'-'+String(dt.getUTCDate()).padStart(2,'0'); }
  function addDaysISO(iso,n){ var p=iso.split('-'); var dt=new Date(Date.UTC(+p[0],+p[1]-1,+p[2])); dt.setUTCDate(dt.getUTCDate()+n); return dt.getUTCFullYear()+'-'+String(dt.getUTCMonth()+1).padStart(2,'0')+'-'+String(dt.getUTCDate()).padStart(2,'0'); }
  function weekNameFromDate(iso){ return 'Sem. du '+formatDateFR(iso); }
  var DAY_OFFSETS = { lundi:0, mardi:1, mercredi:2, jeudi:3, vendredi:4, samedi:5, dimanche:6 };
  function dayOffsetFromName(name){
    var n=(name||'').toLowerCase().trim();
    for(var k in DAY_OFFSETS){ if(n===k || n.indexOf(k)===0) return DAY_OFFSETS[k]; }
    return null;
  }
  function autoDateWeek(week){
    if(!week || !week.startDate) return false;
    var changed=false;
    week.days.forEach(function(d){
      var off=dayOffsetFromName(d.name);
      if(off!=null){ var nd=addDaysISO(week.startDate, off); if(d.date!==nd){ d.date=nd; changed=true; } }
    });
    return changed;
  }
  function sortWeekDays(week){
    if(!week || !week.days) return false;
    var before=week.days.map(function(d){return d.id;}).join(',');
    week.days.sort(function(a,b){ var oa=dayOffsetFromName(a.name), ob=dayOffsetFromName(b.name); return (oa==null?99:oa)-(ob==null?99:ob); });
    return before!==week.days.map(function(d){return d.id;}).join(',');
  }
  function num(x){ if(x===''||x==null) return 0; var n=typeof x==='number'?x:parseFloat(String(x).replace(',','.')); return isNaN(n)?0:n; }
  function toInt(v){ if(v==null||String(v).trim()==='') return null; var n=parseInt(String(v).replace(/[^\d-]/g,''),10); return isNaN(n)?null:n; }
  function toNumN(v){ if(v==null||String(v).trim()==='') return null; var n=parseFloat(String(v).replace(',','.').replace(/[^\d.-]/g,'')); return isNaN(n)?null:n; }
  function intStr(x){ return (x===''||x==null)?'':String(x); }
  function numStr(x){ return (x===''||x==null)?'':String(x).replace('.',','); }
  var NF = new Intl.NumberFormat('fr-FR',{maximumFractionDigits:2});
  function fmt(n){ return NF.format(n); }

  /* ---------- model builders ---------- */
  function freshSet(reps,weight){ return { id:uid(), planReps:(reps==null?null:reps), planWeight:(weight==null?null:weight), done:false, realReps:null, realWeight:null, comment:'' }; }
  function mkEx(name,n,reps,weight){ var s=[]; for(var i=0;i<n;i++) s.push(freshSet(reps,weight)); return { id:uid(), name:name, note:'', sets:s }; }
  function mkDay(name,exs){ return { id:uid(), name:name, date:'', note:'', collapsed:false, exercises:exs }; }
  function freshDay(name){ return mkDay(name||'Jour 1', []); }
  function freshWeek(name){ return { id:uid(), name:name||'Semaine 1', startDate:'', collapsed:false, days:[ freshDay('Jour 1') ] }; }

  function seed(){
    state.library = DEFAULT_LIB.slice();
    var days = [
      mkDay('Lundi', [ mkEx('Curl marteau',3,10,12) ]),
      mkDay('Mardi', [ mkEx('Goblet squat',3,8,18) ]),
      mkDay('Samedi', [
        mkEx('Echauffements épaule',6,10,null),
        mkEx('Soulevé de terre',4,8,50),
        mkEx('Face pull haltères',3,12,6),
        mkEx('Rowing barre droite pronation',4,9,42),
        mkEx('Fentes avec haltères',4,10,15),
        mkEx('Développé incliné 40 degrés haltères',4,8,8)
      ]),
      mkDay('Dimanche', [

  function blockWeek(src, date, mode){

      days: src.days.map(function(d){

            else if(mode==='deload'){ if(isWarmup(x.name)){ sets=x.sets.map(setCopy); } else { var keep=Math.max(1,Math.round(x.sets.length/2)); sets=x.sets.slice(0,keep).map(setCopy); } }

  function generateBlock(){
    var base=curWeek(); if(!base||!base.days||!base.days.length){ toast('Aucune semaine modèle'); return; }
    var hasContent=base.days.some(function(d){ return (d.exercises||[]).some(function(x){ return !isWarmup(x.name) && (x.sets||[]).length; }); });
    if(!hasContent){ toast('Ta semaine modèle est vide — ajoute des exercices d\'abord'); return; }
    var n=Math.max(1,Math.min(12,composerCfg.buildWeeks|0));
    var date=mondayISO(composerCfg.startDate||uniqueWeekDate(defaultNextMonday()));
    var made=[], prev=base;
    for(var i=0;i<n;i++){ var wk=blockWeek(prev, date, i===0?'copy':'progress'); if(composerCfg.rir) wk.rirTarget=buildRir(i,n); if(composerCfg.volRamp && i>0) addSetToWeek(wk); made.push(wk); prev=wk; date=addDaysISO(date,7); }
    if(composerCfg.deload){ var dl=blockWeek(prev, date, 'deload'); if(composerCfg.rir) dl.rirTarget=4; made.push(dl); }
    made.forEach(function(w){ state.weeks.push(w); });

    toast(made.length+' semaines générées 💪');

  // change de mode/charge sur une semaine → recalcule ce même exercice dans les semaines suivantes (non commencées)
  function propagateProgression(fromWeek, ex, baseSet){
    if(!fromWeek || !ex || !fromWeek.startDate || !ex.sets || !ex.sets.length) return;
    var mode=ex.progression||'none', name=(ex.name||'').trim(); if(!name) return;
    var base=baseSet||ex.sets[0], curR=(base.planReps!=null?base.planReps:null), curW=(base.planWeight!=null?base.planWeight:null);
    var later=state.weeks.filter(function(w){ return w.startDate && w.startDate>fromWeek.startDate; }).sort(function(a,b){ return a.startDate<b.startDate?-1:1; });
    var snaps=[], changed=0, broken=false;
    for(var i=0;i<later.length;i++){
      var w=later[i], target=null;
      for(var di=0; di<w.days.length && !target; di++){ var exs=w.days[di].exercises; for(var xi=0; xi<exs.length; xi++){ if((exs[xi].name||'').trim()===name){ target=exs[xi]; break; } } }
      if(!target){ broken=true; continue; }
      if(target.sets.some(function(s){ return s.done; })){ broken=true; continue; }
      snaps.push({ ex:target, oldProg:target.progression, oldSets:target.sets });
      target.progression=mode;
      if(!broken){
        if(!/deload/i.test(w.name||'')){
          if(mode==='volume'){ if(curR!=null) curR=curR+1; }
          else if(mode==='weight'){ if(curW!=null) curW=curW+1; curR=8; }
        }
        var nR=curR, nW=curW;
        target.sets=target.sets.map(function(){ return { id:uid(), planReps:nR, planWeight:nW, done:false, realReps:null, realWeight:null, comment:'' }; });
      }
      changed++;
    }
    if(changed){ save(); toastUndo(changed+' semaine'+(changed>1?'s':'')+' suivante'+(changed>1?'s':'')+' adaptée'+(changed>1?'s':''), function(){ snaps.forEach(function(s){ s.ex.progression=s.oldProg; s.ex.sets=s.oldSets; }); save(); renderProgramme(); }); }
  }

  /* ---------- synchronisation (GitHub) ---------- */
  var SYNC_SUSPEND = false;
  var sync = { status:'off', cfg:null, pushTimer:null, pushing:false, pulling:false, lastPullAt:0, lastError:'' };

  function loadSyncCfg(){ try{ var r=localStorage.getItem(KEY_SYNC); sync.cfg = r?JSON.parse(r):null; }catch(e){ sync.cfg=null; } }
  function saveSyncCfg(){ try{ localStorage.setItem(KEY_SYNC, JSON.stringify(sync.cfg||{})); }catch(e){} }
  function syncConfigured(){ return !!(sync.cfg && sync.cfg.token && sync.cfg.owner && sync.cfg.repo); }
  function syncPath(){ return (sync.cfg && sync.cfg.path) || 'data.json'; }

  function b64enc(str){ var b=new TextEncoder().encode(str), s='', i; for(i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
  function b64dec(b64){ var bin=atob(String(b64).replace(/\s/g,'')), a=new Uint8Array(bin.length), i; for(i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return new TextDecoder().decode(a); }
  function ghHead(){ return { 'Authorization':'Bearer '+sync.cfg.token, 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28' }; }
  function ghRepoUrl(){ return 'https://api.github.com/repos/'+encodeURIComponent(sync.cfg.owner)+'/'+encodeURIComponent(sync.cfg.repo); }
  function ghContentsUrl(){ return ghRepoUrl()+'/contents/'+syncPath().split('/').map(encodeURIComponent).join('/'); }

  function ghCheckRepo(){
    return fetch(ghRepoUrl(), { headers:ghHead(), cache:'no-store' }).then(function(r){
      if(r.status===401) throw new Error('Jeton invalide ou expiré.');
      if(r.status===404) throw new Error('Dépôt introuvable, ou jeton sans accès à ce dépôt.');
      if(!r.ok) throw new Error('GitHub '+r.status);
      return true;
    });
  }
  function ghPull(){
    return fetch(ghContentsUrl(), { headers:ghHead(), cache:'no-store' }).then(function(r){
      if(r.status===404) return { empty:true };
      if(r.status===401) throw new Error('Jeton invalide ou expiré.');
      if(!r.ok) throw new Error('GitHub '+r.status);
      return r.json().then(function(j){ return { data:JSON.parse(b64dec(j.content)), sha:j.sha }; });
    });
  }
  function ghPush(payloadStr, sha){
    var body={ message:'sync '+new Date().toISOString(), content:b64enc(payloadStr) };
    if(sha) body.sha=sha;
    return fetch(ghContentsUrl(), { method:'PUT', headers:ghHead(), body:JSON.stringify(body) }).then(function(r){
      if(r.ok) return r.json().then(function(j){ return j.content.sha; });
      return r.text().then(function(t){ var e=new Error('GitHub '+r.status); e.status=r.status; e.detail=t; throw e; });
    });
  }

  function isReglagesActive(){ var v=$('view-reglages'); return v && v.classList.contains('active'); }
  function setSyncStatus(s, err){ sync.status=s; if(err!=null) sync.lastError=err; updateSyncBadge(); if(isReglagesActive()) refreshSyncCard(); }

  function schedulePush(){ if(!syncConfigured()) return; clearTimeout(sync.pushTimer); sync.pushTimer=setTimeout(function(){ doPush(); },1500); }
  function doPush(retry){
    if(!syncConfigured() || sync.pushing) return;
    if(!retry && sync.cfg.lastPushedAt && sync.cfg.lastPushedAt===state.updatedAt){ return; }
    sync.pushing=true; setSyncStatus('syncing');
    var payload=JSON.stringify(state), at=state.updatedAt;
    ghPush(payload, sync.cfg.lastSha).then(function(newSha){
      sync.cfg.lastSha=newSha; sync.cfg.lastPushedAt=at; sync.cfg.lastSyncAt=Date.now(); saveSyncCfg();
      sync.pushing=false; setSyncStatus('ok');
    }).catch(function(e){
      sync.pushing=false;
      if(!retry && (e.status===409 || e.status===422)){
        ghPull().then(function(res){
          if(!res.empty){ sync.cfg.lastSha=res.sha; saveSyncCfg();
            if((res.data.updatedAt||0) > (state.updatedAt||0)){ applyRemoteState(res.data); setSyncStatus('ok'); return; } }
          doPush(true);
        }).catch(function(){ setSyncStatus('error','Conflit de synchronisation.'); });
      } else { setSyncStatus('error', e.message); }
    });
  }
  function doPull(opts){
    opts = opts||{};
    if(!syncConfigured() || sync.pulling) return Promise.resolve();
    sync.pulling=true; sync.lastPullAt=Date.now(); if(!opts.silent) setSyncStatus('syncing');
    return ghPull().then(function(res){
      sync.pulling=false;
      if(res.empty){ setSyncStatus('ok'); return; }
      sync.cfg.lastSha=res.sha; saveSyncCfg();
      if((res.data.updatedAt||0) > (state.updatedAt||0) || opts.force){ applyRemoteState(res.data); }
      setSyncStatus('ok');
    }).catch(function(e){ sync.pulling=false; setSyncStatus('error', e.message); });
  }
  function applyRemoteState(remote){
    if(!remote || !Array.isArray(remote.weeks)) return;
    SYNC_SUSPEND=true;
    state.weeks=remote.weeks;
    state.library=(Array.isArray(remote.library)&&remote.library.length)?remote.library:DEFAULT_LIB.slice();
    state.templates=Array.isArray(remote.templates)?remote.templates:[];
    state.measurements=Array.isArray(remote.measurements)?remote.measurements:[];
    state.settings=Object.assign({theme:'dark',metric:'weight'}, remote.settings||{});
    state.currentWeekId=remote.currentWeekId||(remote.weeks[0]&&remote.weeks[0].id)||null;
    state.updatedAt=remote.updatedAt||Date.now();
    try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
    if(sync.cfg){ sync.cfg.lastPushedAt=state.updatedAt; saveSyncCfg(); }
    SYNC_SUSPEND=false;
    applyTheme(); renderAll(); if(isReglagesActive()) renderReglages();
    toast('Données synchronisées');
  }

  function syncConnectFromForm(){
    var t=(($('sync-token')&&$('sync-token').value)||'').trim();
    var o=(($('sync-owner')&&$('sync-owner').value)||'').trim();
    var rp=(($('sync-repo')&&$('sync-repo').value)||'').trim();
    var pa=(($('sync-path')&&$('sync-path').value)||'').trim();
    if(sync.cfg && !t) t=sync.cfg.token;
    if(!t||!o||!rp){ alert('Renseigne le jeton, le propriétaire (ton nom d\'utilisateur GitHub) et le nom du dépôt.'); return; }
    var sameRepo = sync.cfg && sync.cfg.owner===o && sync.cfg.repo===rp && (sync.cfg.path||'data.json')===(pa||'data.json');
    sync.cfg={ token:t, owner:o, repo:rp, path:(pa||'data.json'),
               lastSha:(sameRepo?sync.cfg.lastSha:null), lastSyncAt:(sync.cfg?sync.cfg.lastSyncAt:0), lastPushedAt:(sameRepo?sync.cfg.lastPushedAt:0) };
    saveSyncCfg(); setSyncStatus('syncing');
    ghCheckRepo().then(function(){ return ghPull(); }).then(function(res){
      if(res.empty){
        if(confirm('Connexion réussie ✓\n\nLe dépôt est vide. Y envoyer tes données actuelles (programme + historique) ?')){ doPush(); }
        else { setSyncStatus('ok'); }
        return;
      }
      sync.cfg.lastSha=res.sha; saveSyncCfg();
      var hasLocal = state.weeks && state.weeks.length;
      if(!hasLocal){ applyRemoteState(res.data); return; }
      var when=''; try{ if(res.data.updatedAt) when=' (maj '+formatDateFR(new Date(res.data.updatedAt).toISOString().slice(0,10))+')'; }catch(e){}
      if(confirm('Connexion réussie ✓\n\nDes données existent déjà sur GitHub'+when+'.\n\n• OK = récupérer le cloud (remplace les données de CET appareil)\n• Annuler = garder les données de cet appareil (et les envoyer au cloud)')){
        applyRemoteState(res.data);
      } else { doPush(); }
    }).catch(function(e){ setSyncStatus('error', e.message); alert('Échec de connexion : '+e.message); });
  }
  function syncNow(){ if(!syncConfigured()) return; doPull({force:false}).then(function(){ doPush(); }); }
  function syncDisconnect(){
    if(!confirm('Déconnecter la synchronisation sur cet appareil ?\n\n(Tes données locales restent intactes ; le dépôt GitHub n\'est pas supprimé.)')) return;

    else if(sync.status==='error'){ col='var(--danger)'; txt='!'; ttl='Erreur de synchro — '+sync.lastError; }
    else { col='var(--success)'; txt='✓'; ttl='Synchronisé'+(sync.cfg.lastSyncAt?(' · '+timeAgo(sync.cfg.lastSyncAt)):''); }
    el.style.color=col; el.title=ttl; if(dot) dot.textContent=txt;
  }
  function syncCardInner(){
    var on=syncConfigured(), c=sync.cfg||{}, statusTxt, statusCol;
    if(!on){ statusTxt='Non configuré sur cet appareil'; statusCol='var(--text-faint)'; }
    else if(sync.status==='syncing'){ statusTxt='Synchronisation…'; statusCol='var(--text-dim)'; }
    else if(sync.status==='error'){ statusTxt='Erreur : '+esc(sync.lastError||'inconnue'); statusCol='var(--danger)'; }
    else { statusTxt='Connecté'+(c.lastSyncAt?(' · dernière sync '+esc(timeAgo(c.lastSyncAt))):''); statusCol='var(--success)'; }
    var head='<div class="section-label">Synchronisation (GitHub)</div>'+
      '<p class="hint" style="margin-bottom:12px">Synchronise automatiquement PC ↔ iPhone via un dépôt GitHub privé. Le jeton est stocké uniquement sur cet appareil et n\'est jamais envoyé dans le cloud.</p>';
    var fields='<div style="display:grid;gap:9px;max-width:460px;margin-bottom:12px">'+
        '<input id="sync-owner" class="date-input" style="font-size:14px" placeholder="Nom d\'utilisateur GitHub (propriétaire)" value="'+escA(c.owner||'')+'" autocapitalize="off" autocomplete="off" spellcheck="false">'+
        '<input id="sync-repo" class="date-input" style="font-size:14px" placeholder="Nom du dépôt (ex. muscu-data)" value="'+escA(c.repo||'')+'" autocapitalize="off" autocomplete="off" spellcheck="false">'+
        '<input id="sync-token" class="date-input" type="password" style="font-size:14px" placeholder="'+(on?'Jeton enregistré — laisser vide pour le garder':'Jeton d\'accès (github_pat_…)')+'" autocomplete="off">'+
        '<input id="sync-path" class="date-input" style="font-size:14px" placeholder="Fichier (défaut : data.json)" value="'+escA(c.path&&c.path!=='data.json'?c.path:'')+'" autocapitalize="off" autocomplete="off" spellcheck="false">'+
      '</div>';
    var btns = on
      ? '<div class="btn-grid" style="max-width:460px"><button class="btn primary" data-act="sync-now">'+ic(P.trend)+'Synchroniser maintenant</button><button class="btn" data-act="sync-connect">Mettre à jour la connexion</button><button class="btn danger" data-act="sync-disconnect">'+ic(P.trash)+'Déconnecter</button></div>'
      : '<button class="btn primary" data-act="sync-connect">'+ic(P.trend)+'Connecter</button>';
    return head+fields+btns+'<p class="hint" style="margin-top:12px">Statut : <b style="color:'+statusCol+'">'+statusTxt+'</b></p>';
  }
  function refreshSyncCard(){ var host=$('sync-card-host'); if(host) host.innerHTML=syncCardInner(); }

  /* ---------- vue initiale : déplier la séance du jour ---------- */
  function autoExpandToday(){
    var w=curWeek(); if(!w || !w.days || !w.days.length) return;
    var today=todayISO(), cand=w.days.filter(function(d){ return d.date && !dayIsComplete(d); });
    if(!cand.length) return;            // rien à déplier (jours terminés ou sans date) -> on laisse l'état
    var target=null;
    cand.forEach(function(d){ if(d.date===today) target=d; });               // 1. aujourd'hui (non terminé)
    if(!target){ cand.forEach(function(d){ if(d.date>today && (!target||d.date<target.date)) target=d; }); }  // 2. prochaine à venir non terminée
    if(!target){ cand.forEach(function(d){ if(!target||d.date>target.date) target=d; }); }                    // 3. plus récente passée non terminée
    if(!target) return;
    w.days.forEach(function(d){ d.collapsed=(d.id!==target.id); });
  }

  /* ---------- init ---------- */
  load(); loadSyncCfg(); autoExpandToday(); applyTheme(); renderAll(); updateSyncBadge();
  if(IS_PREVIEW){
    var pvb=document.createElement('div');
    pvb.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:200;background:var(--accent-grad);color:#fff;font:700 12px/1.3 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:7px 10px;letter-spacing:.3px;display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;';
    var pvs=document.createElement('span'); pvs.textContent='DÉMO — données de test, non synchronisé';
    var pvi=document.createElement('button'); pvi.textContent='⬇ Importer mes données de prod';
    pvi.style.cssText='font:700 12px/1 inherit;background:#fff;color:#4f46e5;border:0;border-radius:8px;padding:7px 11px;cursor:pointer;';
    pvi.onclick=function(){ var prod=localStorage.getItem('suivi-muscu-v3'); if(!prod){ alert('Aucune donnée de prod trouvée sur cet appareil. Ouvre la vraie app (hors démo) une fois pour charger tes données, puis reviens ici.'); return; } if(!confirm('Copier tes données de prod dans la démo ? La démo actuelle sera remplacée.')) return; localStorage.setItem(KEY, prod); location.reload(); };
    pvb.appendChild(pvs); pvb.appendChild(pvi); document.body.appendChild(pvb);
  }
  if(syncConfigured()){ doPull({silent:false}).then(function(){ autoExpandToday(); renderProgramme(); }); }
  function maybePull(){ if(syncConfigured() && (Date.now()-sync.lastPullAt>4000)){ doPull({silent:true}); } }
  window.addEventListener('focus', maybePull);
  document.addEventListener('visibilitychange', function(){ if(!document.hidden) maybePull(); });
  window.addEventListener('online', function(){ if(syncConfigured()) schedulePush(); });
  /* Service worker : mise a jour auto (reseau d'abord) + fonctionnement hors-ligne. */
  if('serviceWorker' in navigator){ window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
  /* iOS PWA : env(safe-area-inset-*) vaut 0 au 1er paint et ne se remplit (bottom≈34, top≈62) que
     PLUS TARD — souvent seulement apres la 1re interaction — d'ou une barre de nav trop basse a
     l'ouverture. On MEMORISE la safe-area (localStorage) pour l'appliquer IMMEDIATEMENT au demarrage
     suivant (avant le 1er paint, sans attendre env), puis on la rafraichit des qu'env() est lisible
     (timers, resize, rotation, 1re interaction). Ainsi la barre est bien placee des l'ouverture. */
  var SA_KEY = 'increm-sa2';
  function readEnv(prop){ var p=document.createElement('div'); p.style.cssText='position:fixed;left:-9999px;top:0;width:1px;height:env('+prop+',0px);pointer-events:none'; document.body.appendChild(p); var v=Math.round(p.getBoundingClientRect().height); p.remove(); return v; }
  function applySA(sab, sat){ var st=document.documentElement.style; if(sab>0) st.setProperty('--nav-pb','calc(7px + '+sab+'px)'); if(sat>0) st.setProperty('--header-pt', sat+'px'); }
  try{ var _sa=JSON.parse(localStorage.getItem(SA_KEY)||'null'); if(!_sa && navigator.standalone===true) _sa={b:34,t:50}; if(_sa) applySA(_sa.b||0, _sa.t||0); }catch(_){}   /* immediat, avant le 1er paint : valeur memorisee, ou defaut iOS standalone au 1er lancement */
  function fixSafeArea(){ var sab=readEnv('safe-area-inset-bottom'), sat=readEnv('safe-area-inset-top'); if(sab>0 || sat>0){ applySA(sab, sat); try{ localStorage.setItem(SA_KEY, JSON.stringify({b:sab, t:sat})); }catch(_){} } }
  [0,50,120,250,500,900,1500,2500,4000].forEach(function(ms){ setTimeout(fixSafeArea, ms); });
  requestAnimationFrame(function(){ requestAnimationFrame(fixSafeArea); });
  if(window.visualViewport && window.visualViewport.addEventListener){ window.visualViewport.addEventListener('resize', fixSafeArea); }
  window.addEventListener('orientationchange', function(){ setTimeout(fixSafeArea, 300); });
  ['pointerdown','touchstart'].forEach(function(ev){ window.addEventListener(ev, function(){ fixSafeArea(); setTimeout(fixSafeArea,60); }, {passive:true}); });
  /* Recalage de la barre en PWA : iOS peut COMPOSER la barre fixe au mauvais endroit au lancement a
     froid (bug WebKit standalone) meme quand la geometrie est correcte — un changement de vue la
     recale. On automatise ce recalage : barre deplacee en enfant direct de <body> (plus aucune
     interaction avec le header) + re-rendu force (toggle display synchrone, jamais peint) au
     demarrage, au load/pageshow (retour au 1er plan), sur timers et au 1er toucher. */
  var NAV_STANDALONE = (navigator.standalone===true) || (window.matchMedia && matchMedia('(display-mode: standalone)').matches);
  var navSettleCount = 0;
  function navSettle(){
    if(!NAV_STANDALONE || navSettleCount>12) return;
    if(!window.matchMedia || !matchMedia('(max-width:680px)').matches) return;
    var n=document.querySelector('nav.tabs'); if(!n) return;
    navSettleCount++;
    if(n.parentNode!==document.body) document.body.appendChild(n);   /* enfant direct de body — events delegues au document, donc sans risque */
    n.style.display='none'; void n.offsetHeight; n.style.display=''; /* re-rendu force, synchrone : l'etat cache n'est jamais peint */
  }
  navSettle();
  window.addEventListener('load', navSettle);
  window.addEventListener('pageshow', function(){ navSettleCount=0; navSettle(); });
  [120, 400, 1000].forEach(function(ms){ setTimeout(navSettle, ms); });
  window.addEventListener('touchstart', navSettle, {passive:true});
  if(window.matchMedia){ var _mqm=matchMedia('(max-width:680px)'); var _mvBack=function(){ if(!_mqm.matches){ var tb=document.querySelector('.topbar'), n=document.querySelector('nav.tabs'); if(tb && n && n.parentNode===document.body) tb.insertBefore(n, tb.querySelector('.grow')); } }; if(_mqm.addEventListener) _mqm.addEventListener('change', _mvBack); else if(_mqm.addListener) _mqm.addListener(_mvBack); }
  /* Constat utilisateur : seul un CHANGEMENT DE VUE recale la barre (pas un simple toucher). On
     automatise donc exactement ce geste apres le lancement : re-jeu de la vue active (toggle
     .active synchrone — l'etat cache n'est jamais peint, mais l'animation/composition repart comme
     lors d'une navigation) + hauteur du body epinglee sur innerHeight (si le viewport initial d'iOS
     est trop court au demarrage, la colonne app-shell suit sa correction et la barre descend). */
  var shellFixUntil = 0;
  function replayView(){ var v=document.querySelector('.view.active'); if(!v) return; v.classList.remove('active'); void document.body.offsetHeight; v.classList.add('active'); }
  function scrollNudge(){
    /* reproduit le geste qui recale tout ("remonter la page") : un VRAI scroll du document de 2px,
       aller-retour — invisible (le body est fixe, seul le canvas bouge d'1px un instant) mais force
       iOS a recomposer la racine comme un rubber-band natif */
    try{
      var de=document.documentElement, prev=de.style.height;
      de.style.height='calc(100% + 2px)';
      window.scrollTo(0,1); window.scrollTo(0,0);
      de.style.height=prev;
    }catch(_){}
  }
  function shellFix(){
    if(!NAV_STANDALONE) return;
    if(!window.matchMedia || !matchMedia('(max-width:680px)').matches) return;
    try{
      if (window.innerHeight) document.documentElement.style.setProperty('--app-h', window.innerHeight + 'px');
    }catch(_){}
    if(Date.now() < shellFixUntil){ replayView(); scrollNudge(); }
  }
  shellFixUntil = Date.now()+8000;
  [250, 900, 2000].forEach(function(ms){ setTimeout(shellFix, ms); });
  window.addEventListener('pageshow', function(){ shellFixUntil = Date.now()+8000; setTimeout(shellFix, 60); });
  window.addEventListener('resize', shellFix);
  if(window.visualViewport && window.visualViewport.addEventListener){ window.visualViewport.addEventListener('resize', shellFix); }
})();
</script>
